services:
  - type: web
    name: google-play-downloader
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LANG
        value: zh
      - key: COUNTRY
        value: us
